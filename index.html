<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yango Taxi CBBA | Live Support</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      margin: 0;
      font-size: 36px;
    }

    .phone {
      margin-top: 10px;
      font-weight: bold;
      font-size: 18px;
      color: #ff1a1a;
    }

    .call-box {
      margin-top: 20px;
    }

    .call-button {
      display: inline-block;
      padding: 12px 20px;
      background: #ff1a1a;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .note {
      margin-top: 20px;
      padding: 15px;
      background: #eef4ff;
      border-left: 4px solid #2563eb;
      border-radius: 8px;
    }

    @media(max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LEFT -->
    <div class="card">
      <div class="logo">
        <img src="logo-yango.png" alt="Yango Logo">
      </div>

      <h1>YANGO TAXI CBBA</h1>

      <div class="phone">
        📞 62744330
      </div>

      <p>
        Official support page for Yango Taxi Cochabamba.
        Use live chat or call directly.
      </p>

      <div class="call-box" id="callContainer"></div>

      <div class="note">
        Live chat should appear in the bottom-right corner.
      </div>
    </div>

    <!-- RIGHT -->
    <div class="card">
      <h2>Need help?</h2>
      <p>
        Contact our support team for booking, service, or assistance.
      </p>
    </div>

  </div>

  <!-- SCRIPT PARA BOTÓN DE LLAMADA -->
  <script>
    /*
      1. Intenta leer variable de Render (si existe en window)
      2. Si no existe, usa fallback manual
    */

    const fallbackCallUrl = ""; // 👈 aquí puedes pegar manual si quieres

    function getRenderVariable(name) {
      if (window && window[name]) return window[name];
      return null;
    }

    const callUrl =
      getRenderVariable("YEASTAR_WEBRTC_CALL_URL") ||
      fallbackCallUrl;

    const container = document.getElementById("callContainer");

    if (callUrl) {
      const btn = document.createElement("a");
      btn.href = callUrl;
      btn.target = "_blank";
      btn.className = "call-button";
      btn.innerText = "📞 Call Now (WebRTC)";
      container.appendChild(btn);
    }
  </script>

  <!-- YEASTAR CHAT (NO TOCAR) -->
  <script src="https://nuxwaytechnology.use.ycmcloud.com/live_chat.v1.0.0.js?channelNumber=LC00007"></script>

</body>
</html>
